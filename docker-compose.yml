version: '3.8'

services:
  web:
    build: .
    container_name: yawallet-web
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/yawallet
      - ADMIN_PHONE=923001234567
      - ADMIN_PASSWORD=admin123
      - ADMIN_NAME=Admin
    depends_on:
      - db
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

  db:
    image: postgres:15-alpine
    container_name: yawallet-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yawallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
